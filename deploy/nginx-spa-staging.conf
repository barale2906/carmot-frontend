# Fragmento para HestiaCP (Nginx) — Vue Router en modo history
# Pegar en: Web → [tu dominio staging] → Edit → "Custom nginx directives"
# o en la plantilla del dominio, dentro del bloque server { ... } del sitio.
#
# Ajusta la ruta de root si tu docroot no es public_html.

location / {
    try_files $uri $uri/ /index.html;
}

# Cache agresivo para assets con hash (Vite); opcional pero recomendado
location ~* \.(js|css|woff2?|ttf|eot|svg|png|jpg|jpeg|gif|webp|ico)$ {
    expires 30d;
    add_header Cache-Control "public, immutable";
}
