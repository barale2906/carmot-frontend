# HestiaCP (Nginx) — Vue Router modo history + caché de assets
# Dominio: carmot-front.gislasas.com
#
# Cómo aplicarlo en HestiaCP:
#   Web → carmot-front.gislasas.com → Edit → "Custom nginx directives"
#   Pega el contenido de este archivo dentro del bloque server { ... }.
#
# Asegúrate de que el Document Root apunte a public_html
# y de haber subido el contenido de dist/ a esa carpeta.

# SPA: redirige cualquier ruta al index.html
location / {
    try_files $uri $uri/ /index.html;
}

# Cache agresivo para assets con hash generados por Vite
location ~* \.(js|css|woff2?|ttf|eot|svg|png|jpg|jpeg|gif|webp|ico)$ {
    expires 1y;
    add_header Cache-Control "public, immutable";
    access_log off;
}

# Cabeceras de seguridad
add_header X-Content-Type-Options    "nosniff"         always;
add_header X-Frame-Options           "SAMEORIGIN"      always;
add_header X-XSS-Protection          "1; mode=block"   always;
add_header Referrer-Policy           "strict-origin-when-cross-origin" always;
